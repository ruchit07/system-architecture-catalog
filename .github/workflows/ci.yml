name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  hexagonal:
    name: Hexagonal reference tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hexagonal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm test
